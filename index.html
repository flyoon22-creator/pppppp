  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"ko\"><head>\n<meta charset=\"UTF-8\">\n<title>빈자리 뉴스레터 - 2026년 제1호<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<style>\n  html, body {\n    margin: 0;\n    padding: 0;\n    background: #f5f3ee;\n    font-family: -apple-system, BlinkMacSystemFont, \"Apple SD Gothic Neo\", sans-serif;\n  }\n  body {\n    position: relative;\n    /* Extra gray space at the bottom so the floating button can dock\n       below the CTA when the user scrolls to the end. */\n    padding-bottom: 140px;\n  }\n  /* Only the bottom margin area is light gray (#e1e1e1) */\n  body::after {\n    content: \"\";\n    position: absolute;\n    left: 0;\n    right: 0;\n    bottom: 0;\n    height: 140px;\n    background: #e1e1e1;\n    z-index: -1;\n    pointer-events: none;\n  }\n  @media (min-width: 681px) {\n    body { padding-bottom: 170px; }\n    body::after { height: 170px; }\n  }\n  .newsletter {\n    position: relative;\n    width: 100%;\n    max-width: 648px;\n    margin: 0 auto;\n    display: block;\n  }\n  .newsletter img {\n    display: block;\n    width: 100%;\n    height: auto;\n    user-select: none;\n    -webkit-user-drag: none;\n  }\n  /* The three folder hotspots, positioned as percentages of the image height (2580px tall, 648px wide). */\n  .hotspot {\n    position: absolute;\n    left: 0;\n    width: 100%;\n    display: block;\n    text-decoration: none;\n    cursor: pointer;\n    -webkit-tap-highlight-color: transparent;\n    overflow: hidden;\n  }\n  .hotspot:focus,\n  .hotspot:focus-visible,\n  .hotspot:hover,\n  .hotspot:active {\n    outline: none;\n    background: transparent;\n  }\n  /* Click indicator — small circle that briefly appears at the cursor */\n  #click-ring {\n    position: fixed;\n    left: 0;\n    top: 0;\n    width: 36px;\n    height: 36px;\n    margin-left: -18px;\n    margin-top: -18px;\n    border-radius: 50%;\n    background: rgba(80, 80, 80, 0.45);\n    opacity: 0;\n    pointer-events: none;\n    z-index: 99999;\n    transform: scale(0.5);\n  }\n  #click-ring.is-on {\n    animation: clickFlash 520ms ease-out forwards;\n  }\n  @keyframes clickFlash {\n    0%   { opacity: 0;   transform: scale(0.4); }\n    12%  { opacity: 0.9; transform: scale(1);   }\n    100% { opacity: 0;   transform: scale(1.4); }\n  }\n  /* CTA button hotspot */\n  .hotspot-cta {\n    border-radius: 999px;\n  }\n  /* Folder 1: 지금, 빈자리 — 2025년 주요 활동 보고 */\n  .hotspot-1 {\n    top: 29.26%;    /* y=755 / 2580 */\n    height: 18.41%; /* (1230-755)/2580 */\n  }\n  /* Folder 2: 빈자리의 경계 — 국가별 긴급구호 현장 소식 */\n  .hotspot-2 {\n    top: 47.67%;    /* y=1230 / 2580 */\n    height: 17.05%; /* (1670-1230)/2580 — 폴더 3 탭 위로 여백 */\n  }\n  /* Folder 3: 빈자리의 내일 — 후원자님 덕분에 생겨난 변화 */\n  .hotspot-3 {\n    top: 64.73%;    /* y=1670 / 2580 — 폴더 2 클릭 영역 끝나는 지점까지 */\n    height: 15.89%; /* (2080-1670)/2580 */\n  }\n  /* CTA: 뉴스레터 한눈에 보기 버튼 */\n  .hotspot-cta {\n    left: 24.69%;   /* x=160 / 648 */\n    width: 49.38%;  /* (480-160)/648 */\n    top: 94.57%;    /* y=2440 / 2580 */\n    height: 2.33%;  /* (2500-2440)/2580 */\n  }\n\n  /* When the CTA button comes into view, the floating button \"docks\"\n     into the gray bottom padding so it stops covering the CTA. */\n  .floating-donate.is-docked {\n    position: absolute;\n    bottom: 16px;\n    transition: none;\n  }\n  @media (min-width: 681px) {\n    .floating-donate.is-docked {\n      bottom: 24px;\n    }\n  }\n\n  /* Floating donate button — fixed to viewport bottom-right */\n  .floating-donate {\n    position: fixed;\n    right: 16px;\n    bottom: 16px;\n    width: 108px;\n    height: 108px;\n    z-index: 1000;\n    display: block;\n    line-height: 0;\n    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.18)) drop-shadow(0 2px 5px rgba(0,0,0,0.10));\n    transition: transform 160ms ease, filter 160ms ease;\n    -webkit-tap-highlight-color: transparent;\n  }\n  .floating-donate:hover {\n    transform: translateY(-2px);\n    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.22)) drop-shadow(0 4px 8px rgba(0,0,0,0.12));\n  }\n  .floating-donate:active {\n    transform: translateY(0);\n  }\n  .floating-donate img {\n    display: block;\n    width: 100%;\n    height: 100%;\n    user-select: none;\n    -webkit-user-drag: none;\n  }\n  @media (min-width: 681px) {\n    .floating-donate {\n      right: 24px;\n      bottom: 24px;\n      width: 128px;\n      height: 128px;\n    }\n  }\n\n\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"background-color: rgb(124, 124, 124)\">\n  <div class=\"newsletter\" role=\"article\" aria-label=\"빈자리 뉴스레터 2026년 제1호\">\n    <img src=\"28b55573-d861-4c90-a23b-5c16e5f3dc84\" alt=\"빈자리 뉴스레터 - 2026년 제1호 긴급구호 현장 보고서\" width=\"648\" height=\"2580\">\n\n    <a class=\"hotspot hotspot-1\" href=\"https://bit.ly/the-void1-26A\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"지금, 빈자리 — 2025년 주요 활동 보고 보러가기\"><\u002Fa>\n\n    <a class=\"hotspot hotspot-2\" href=\"https://bit.ly/the-void2-26A\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"빈자리의 경계 — 국가별 긴급구호 현장 소식 보러가기\"><\u002Fa>\n\n    <a class=\"hotspot hotspot-3\" href=\"https://bit.ly/the-void3-26A\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"빈자리의 내일 — 후원자님 덕분에 생겨난 변화 보러가기\"><\u002Fa>\n\n    <a class=\"hotspot hotspot-cta\" href=\"https://bit.ly/the-void-26A\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"뉴스레터 한눈에 보기\"><\u002Fa>\n  <\u002Fdiv>\n\n  <a class=\"floating-donate\" href=\"https://bit.ly/the-void26\" target=\"_blank\" rel=\"noopener noreferrer\" aria-label=\"빈자리 후원하기\">\n    <img src=\"132033e5-b3e5-44e1-b85c-85c077b12d3d\" alt=\"빈자리 후원하기\" width=\"300\" height=\"300\">\n  <\u002Fa>\n\n<script>\n(function () {\n  var fab = document.querySelector('.floating-donate');\n  var cta = document.querySelector('.hotspot-cta');\n  if (!fab || !cta) return;\n  if ('IntersectionObserver' in window) {\n    var io = new IntersectionObserver(function (entries) {\n      fab.classList.toggle('is-docked', entries[0].isIntersecting);\n    }, { threshold: 0 });\n    io.observe(cta);\n  } else {\n    // Fallback: simple scroll check\n    window.addEventListener('scroll', function () {\n      var r = cta.getBoundingClientRect();\n      var inView = r.top < window.innerHeight && r.bottom > 0;\n      fab.classList.toggle('is-docked', inView);\n    });\n  }\n})();\n<\u002Fscript>\n\n<script>\n(function () {\n  // Single global click-indicator element appended to body\n  var ring = document.createElement('div');\n  ring.id = 'click-ring';\n  document.body.appendChild(ring);\n\n  var hideTimer = null;\n  function flashAt(x, y) {\n    ring.style.left = x + 'px';\n    ring.style.top  = y + 'px';\n    ring.classList.remove('is-on');\n    // force reflow so the animation restarts\n    void ring.offsetWidth;\n    ring.classList.add('is-on');\n    if (hideTimer) clearTimeout(hideTimer);\n    hideTimer = setTimeout(function () {\n      ring.classList.remove('is-on');\n    }, 560);\n  }\n\n  var targets = document.querySelectorAll('.hotspot, .floating-donate');\n  targets.forEach(function (el) {\n    function onDown(e) {\n      // touch event: take first touch point\n      var x = e.clientX, y = e.clientY;\n      if ((x == null || (x === 0 && y === 0)) && e.touches && e.touches[0]) {\n        x = e.touches[0].clientX;\n        y = e.touches[0].clientY;\n      }\n      if (x == null) {\n        var rect = el.getBoundingClientRect();\n        x = rect.left + rect.width / 2;\n        y = rect.top  + rect.height / 2;\n      }\n      flashAt(x, y);\n    }\n    el.addEventListener('pointerdown', onDown);\n    el.addEventListener('touchstart',  onDown, { passive: true });\n    el.addEventListener('mousedown',   onDown);\n    // keyboard activation fallback\n    el.addEventListener('click', function (e) {\n      if (!e.clientX && !e.clientY) onDown(e);\n    });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
